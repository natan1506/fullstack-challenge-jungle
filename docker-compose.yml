services:
  # ── Banco de dados relacional ──────────────────────────────────────────────
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
      POSTGRES_EXTRA_DATABASES: games,wallets
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Message broker ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      # Cookie fixo evita conflito de permissão em ambientes onde o Erlang
      # não consegue criar/ler ~/.erlang.cookie (Docker Desktop no macOS)
      RABBITMQ_ERLANG_COOKIE: "jungle-secret-cookie"
    healthcheck:
      # check_port_connectivity garante que as portas AMQP estão abertas (ping passa antes disso)
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  # ── Identity provider (OIDC / OAuth2) ─────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: start-dev --import-realm --spi-theme-cache-themes=false --spi-theme-cache-templates=false
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      # KC 25+ aceita URL completa em KC_HOSTNAME (KC_HOSTNAME_URL foi removido).
      # Garante que todos os tokens tenham iss=http://localhost:8080 independente
      # de quem chamou (seed via keycloak:8080 interno ou browser via localhost:8080)
      KC_HOSTNAME: http://localhost:8080
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
      - ./docker/keycloak/themes:/opt/keycloak/themes:ro
    healthcheck:
      # KC 26+ expõe health na porta 9000 (separada da porta principal 8080)
      test:
        ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── API Gateway ────────────────────────────────────────────────────────────
  kong:
    image: kong:3.9.1
    ports:
      - "8000:8000" # proxy
      - "8443:8443" # proxy TLS
      - "8001:8001" # admin API
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./docker/kong:/kong:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Serviço de jogos (rounds, bets, WebSocket) ────────────────────────────
  games:
    build:
      context: ./services/games
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    env_file:
      - ./services/games/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # nc (netcat busybox) verifica se a porta TCP está aberta — curl não existe na imagem bun:alpine
      test: ["CMD-SHELL", "nc -z localhost 4001 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ── Serviço de carteiras (saldo, débito/crédito) ──────────────────────────
  wallets:
    build:
      context: ./services/wallets
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    env_file:
      - ./services/wallets/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4002 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ── Frontend (React + Vite, servido via nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - kong

  # ── Seed de dados iniciais (roda uma vez e sai) ───────────────────────────
  seed:
    image: oven/bun:1-alpine
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts
      - ./package.json:/app/package.json
      - ./bun.lock:/app/bun.lock
      - ./node_modules:/app/node_modules
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      WALLETS_URL: http://wallets:4002
      DATABASE_URL: postgresql://admin:admin@postgres:5432/wallets
    command: bun run scripts/seed.ts
    depends_on:
      - wallets
      - keycloak
    restart: on-failure

volumes:
  postgres_data:
